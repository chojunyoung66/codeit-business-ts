<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모 앱</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <div id="signin-view" class="screen">
        <h1>로그인</h1>
        <div class="input-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="이메일을 입력하세요." />
        </div>
        <div class="input-group">
          <label for="password">비밀번호</label>
          <input
            type="password"
            id="password"
            placeholder="비밀번호를 입력하세요."
          />
        </div>
        <button id="signin-btn" type="button">로그인</button>
        <button id="goto-signup-btn" type="button">회원가입</button>
      </div>

      <div id="signup-view" class="screen">
        <button type="button" class="back-button" data-role="back-button" hidden>
          뒤로가기
        </button>
        회원가입 화면
      </div>

      <div id="memo-view" class="screen">
        <button type="button" class="back-button" data-role="back-button" hidden>
          뒤로가기
        </button>
        메모 화면
      </div>
    </div>

    <script type="module" src="root-screen.js"></script>
  </body>
</html>
